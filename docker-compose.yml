# Local development stack:
#   - surrounding systems (REST + MCP) on :8080
#   - Aspire dashboard (OpenTelemetry viewer) on :18888, OTLP on :4317
services:
  systems:
    build:
      context: .
      dockerfile: Dockerfile.systems
    ports:
      - "8080:8080"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    ports:
      - "18888:18888"   # web UI
      - "4317:18889"    # OTLP gRPC endpoint (set OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317)
